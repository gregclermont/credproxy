# credproxy bundled injector: bearer
#
# Generic bearer-token injector. Runs the `bearer` scheme: the proxy
# substring-swaps the inert placeholder for the real credential inside the
# Authorization header (the "Bearer " prefix the client sends is left as-is).
# Covers most REST APIs (OpenAI, Stripe, GitHub PATs on api.github.com, ...).
# This doubles as the scaffold template for new injectors
# (`credproxy injector scaffold NAME`).

scheme = "bearer"               # proxy mechanism: substitute in a header
# env  = "API_TOKEN"            # optional: suggested workspace-side env var

# [params]                       # bearer params (defaults shown)
# header = "Authorization"       # the header the credential rides in

# [placeholder] omitted -> default pattern: prefix "credproxy_", length 40,
# charset "alnumeric". Add a [placeholder] table to match a service's token
# format (prefix / length / charset).
